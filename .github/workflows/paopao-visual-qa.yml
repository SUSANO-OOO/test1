name: PAOPAO visual QA

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chromium-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Start local site
        run: |
          python3 -m http.server 4173 > /tmp/paopao-http.log 2>&1 &
          for attempt in 1 2 3 4 5; do
            curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null && exit 0
            sleep 2
          done
          cat /tmp/paopao-http.log
          exit 1

      - name: Test repository build in Chromium
        env:
          BASE_URL: http://127.0.0.1:4173/index.html
          OUTPUT_PREFIX: local
        run: node qa/visual-qa.mjs

      - name: Test runtime performance and animation
        env:
          BASE_URL: http://127.0.0.1:4173/index.html
        run: node qa/performance-qa.mjs

      - name: Upload QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paopao-visual-qa-${{ github.sha }}
          path: qa-artifacts
          if-no-files-found: error
          retention-days: 14