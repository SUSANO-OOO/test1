name: PAOPAO visual QA

on:
  push:
    branches:
      - main
    paths-ignore:
      - qa-status.json
      - deployment-status.json
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  chromium-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Assemble optimized portrait
        run: |
          cat \
            assets/portrait.b64.part1 \
            assets/portrait.b64.part2 \
            assets/portrait.b64.part3 \
            assets/portrait.b64.part4 \
            | base64 --decode > portrait.webp
          echo "2806b0d0090aa2a08fab840c2d288208352b5cc3219e3479789c47aa0865eca9  portrait.webp" \
            | sha256sum --check --strict

      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Start local site
        run: |
          python3 -m http.server 4173 > /tmp/paopao-http.log 2>&1 &
          for attempt in 1 2 3 4 5; do
            curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null && exit 0
            sleep 2
          done
          cat /tmp/paopao-http.log
          exit 1

      - name: Test repository build in Chromium
        env:
          BASE_URL: http://127.0.0.1:4173/index.html
          OUTPUT_PREFIX: local
        run: node qa/visual-qa.mjs

      - name: Test runtime performance and animation
        env:
          BASE_URL: http://127.0.0.1:4173/index.html
        run: node qa/performance-qa.mjs

      - name: Upload QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paopao-visual-qa-${{ github.sha }}
          path: qa-artifacts
          if-no-files-found: warn
          retention-days: 14

      - name: Record QA result
        if: always() && github.event_name == 'push'
        env:
          SOURCE_SHA: ${{ github.sha }}
          JOB_STATUS: ${{ job.status }}
        run: |
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          data = {
              'status': os.environ.get('JOB_STATUS', ''),
              'source_sha': os.environ.get('SOURCE_SHA', ''),
              'recorded_at': datetime.now(timezone.utc).isoformat(),
          }
          with open('qa-status.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
              f.write('\n')
          PY
          git config user.name "PAOPAO QA Bot"
          git config user.email "actions@users.noreply.github.com"
          git add qa-status.json
          git diff --cached --quiet && exit 0
          git commit -m "Record LP QA status"
          git push origin HEAD:main
