name: Deploy PAOPAO LP to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - deployment-status.json
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        id: configure
        continue-on-error: true
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare static site
        if: steps.configure.outcome == 'success'
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='qa' \
            --exclude='_site' \
            --exclude='deployment-status.json' \
            ./ _site/

          cat \
            assets/portrait.b64.part1 \
            assets/portrait.b64.part2 \
            assets/portrait.b64.part3 \
            assets/portrait.b64.part4 \
            | base64 --decode > _site/portrait.webp

          echo "2806b0d0090aa2a08fab840c2d288208352b5cc3219e3479789c47aa0865eca9  _site/portrait.webp" \
            | sha256sum --check --strict

          rm -f _site/assets/portrait.b64.part1 \
            _site/assets/portrait.b64.part2 \
            _site/assets/portrait.b64.part3 \
            _site/assets/portrait.b64.part4
          touch _site/.nojekyll

      - name: Upload Pages artifact
        if: steps.configure.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        if: steps.configure.outcome == 'success'
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Record deployment result
        if: always()
        env:
          CONFIGURE_OUTCOME: ${{ steps.configure.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          data = {
              'configure': os.environ.get('CONFIGURE_OUTCOME', ''),
              'deploy': os.environ.get('DEPLOY_OUTCOME', ''),
              'page_url': os.environ.get('PAGE_URL', ''),
              'source_sha': os.environ.get('SOURCE_SHA', ''),
              'recorded_at': datetime.now(timezone.utc).isoformat(),
          }
          with open('deployment-status.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
              f.write('\n')
          PY
          git config user.name "PAOPAO Pages Bot"
          git config user.email "actions@users.noreply.github.com"
          git add deployment-status.json
          git diff --cached --quiet && exit 0
          git commit -m "Record Pages deployment status"
          git push origin HEAD:main

      - name: Fail when deployment failed
        if: steps.configure.outcome != 'success' || steps.deployment.outcome != 'success'
        run: exit 1
