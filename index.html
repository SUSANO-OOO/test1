<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#08090c"><title>PAOPAO | Personal Signal</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#08090c;color:#f0ece3;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif}.load{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 50%,#121720,#08090c 65%)}.core{width:min(72vw,440px)}.name{font:900 clamp(3rem,11vw,7rem)/.8 Impact,"Arial Black",sans-serif;letter-spacing:-.05em}.sub{margin-top:20px;color:#8cf7ee;font:700 .65rem ui-monospace,monospace;letter-spacing:.16em}.bar{height:1px;margin-top:22px;background:rgba(255,255,255,.12);overflow:hidden}.bar:after{content:"";display:block;width:45%;height:100%;background:linear-gradient(90deg,#f04f71,#8cf7ee);animation:run 1.1s ease-in-out infinite}.err{margin-top:18px;color:#a5a7a8;font-size:.78rem;display:none}@keyframes run{from{transform:translateX(-110%)}to{transform:translateX(330%)}}</style></head><body><div class="load"><div class="core"><div class="name">PAO<br>PAO</div><div class="sub">ASSEMBLING PERSONAL SIGNAL</div><div class="bar"></div><div class="err" id="err">読み込みに失敗しました。ページを再読み込みしてください。</div></div></div><script>const ROOT='https://raw.githubusercontent.com/SUSANO-OOO/test1/main/';Promise.all([0,1,2,3,4].map(i=>fetch(ROOT+`payload/${String(i).padStart(2,'0')}.txt?v=4`,{cache:'no-store'}).then(r=>{if(!r.ok)throw Error(r.status);return r.text()}))).then(parts=>{const html=parts.join('').replace('<head>','<head><base href="'+ROOT+'">');document.open();document.write(html);document.close()}).catch(()=>document.getElementById('err').style.display='block');</script></body></html>
