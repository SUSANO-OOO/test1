<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>3D Demo – One-click</title>
  <style>
    body{margin:0;overflow:hidden;background:#000;}
    #info{position:absolute;top:10px;left:10px;color:#fff;background:rgba(0,0,0,.45);padding:10px;border-radius:4px;font-family:sans-serif;}
    #focus{position:absolute;left:50%;bottom:20px;transform:translateX(-50%);color:#fff;background:rgba(0,0,0,.45);padding:8px 12px;border-radius:4px;font-family:sans-serif;pointer-events:none;}
  </style>
</head>
<body>
  <div id="info">ドラッグで回転・ホイールでズーム。赤い球をクリックするとフォーカスします。</div>
  <div id="focus"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/controls/OrbitControls.js"></script>
  <script>
    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
    camera.position.set(5,3,8);
    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const cube = new THREE.Mesh(new THREE.BoxGeometry(2,2,2),
      new THREE.MeshStandardMaterial({color:0x0080ff, roughness:0.4, metalness:0.1}));
    scene.add(cube);

    const pts=[{name:'頂点 A',pos:new THREE.Vector3( 1,1,1)},
               {name:'頂点 B',pos:new THREE.Vector3(-1,1,-1)}];
    const markMat = new THREE.MeshBasicMaterial({color:0xff3333});
    pts.forEach(p=>{
      const m=new THREE.Mesh(new THREE.SphereGeometry(0.12,24,24),markMat);
      m.position.copy(p.pos);m.userData=p;scene.add(m);
    });

    scene.add(new THREE.AmbientLight(0xffffff,0.8));
    const dir=new THREE.DirectionalLight(0xffffff,1);dir.position.set(3,4,5);scene.add(dir);

    const ray=new THREE.Raycaster(),mouse=new THREE.Vector2(),label=document.getElementById('focus');
    renderer.domElement.addEventListener('pointerdown',e=>{
      mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;
      ray.setFromCamera(mouse,camera);
      const hit=ray.intersectObjects(scene.children).find(o=>o.object.userData.name);
      if(hit){
        const {pos,name}=hit.object.userData;
        controls.target.copy(pos);
        camera.position.lerp(pos.clone().add(new THREE.Vector3(2,2,2)),0.35);
        label.textContent=name;label.style.opacity=1;setTimeout(()=>label.style.opacity=0,3000);
      }
    });

    function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);} animate();
    addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  </script>
</body>
</html>
